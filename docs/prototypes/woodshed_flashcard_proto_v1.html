<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woodshed — Flash Card Component v1</title>
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f4f4f2;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #555550;
    --color-text-tertiary: #99998f;
    --color-border-secondary: rgba(0,0,0,0.3);
    --color-border-tertiary: rgba(0,0,0,0.15);
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --border-radius-md: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1a1a1a;
      --color-background-secondary: #252525;
      --color-text-primary: #f0f0ec;
      --color-text-secondary: #aaaaaa;
      --color-text-tertiary: #666660;
      --color-border-secondary: rgba(255,255,255,0.3);
      --color-border-tertiary: rgba(255,255,255,0.15);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    font-family: var(--font-sans);
    padding: 2rem;
  }

  .container {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    max-width: 480px;
    margin: 0 auto;
  }

  .label {
    font-size: 11px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── MODE TOGGLE ── */
  .mode-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .mode-label {
    font-size: 11px;
    color: var(--color-text-tertiary);
  }
  .mode-btn {
    padding: 5px 12px;
    font-size: 12px;
    border-radius: 4px;
    border: 0.5px solid var(--color-border-secondary);
    background: transparent;
    color: var(--color-text-secondary);
    cursor: pointer;
    font-family: var(--font-sans);
  }
  .mode-btn.active {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: transparent;
  }

  /* ── FLASH CARD ── */
  .card {
    border: 0.5px solid var(--color-border-secondary);
    position: relative;
    height: 120px;
    overflow: hidden;
  }

  /* centered unit: string strip + number, whole thing centered */
  .centered-unit {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  /* narrow string strip — same string spacing as tab component (14px) */
  .string-strip {
    position: relative;
    width: 48px;
    flex-shrink: 0;
  }
  .strip-str {
    position: absolute;
    left: 0; right: 0;
    /* height and background set per string by JS */
  }

  /* the note/fret display — large, sans-serif, transparent bg */
  .num-el {
    font-family: var(--font-sans);
    font-size: 76px;
    font-weight: 500;
    color: var(--color-text-primary);
    line-height: 1;
    background: transparent;
    display: block;
    flex-shrink: 0;
  }

  /* ── ANIMATIONS ── */

  /* wrong: shake the number only, dim briefly */
  @keyframes shakeX {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-8px); }
    40%     { transform: translateX(8px); }
    60%     { transform: translateX(-5px); }
    80%     { transform: translateX(5px); }
  }

  /* correct: teal flash + scale, then advance */
  @keyframes correctScale {
    0%   { transform: scale(1);    color: var(--color-text-primary); }
    40%  { transform: scale(1.10); color: #4ab8d4; }
    100% { transform: scale(1);    color: var(--color-text-primary); }
  }

  .num-el.shake   { animation: shakeX 280ms ease-out forwards; }
  .num-el.correct { animation: correctScale 200ms ease-out forwards; }

  /* ── CONTROLS (dev only — replaced by pitch detection in production) ── */
  .btn-row {
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 10px;
    font-size: 14px;
    font-family: var(--font-sans);
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    cursor: pointer;
  }
  .btn:active { transform: scale(0.98); }
  .btn.wrong {
    border-color: rgba(200,80,80,0.35);
    color: rgba(200,80,80,0.75);
  }
  .btn.right {
    border-color: rgba(74,184,212,0.4);
    color: #4ab8d4;
  }

  .version-tag {
    font-size: 11px;
    color: var(--color-text-tertiary);
    text-align: right;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="container">

  <div class="label">Woodshed — Flash Card Component</div>

  <div class="mode-row">
    <span class="mode-label">mode</span>
    <button class="mode-btn active" id="btnFret" onclick="setMode('fret')">fret → name</button>
    <button class="mode-btn" id="btnName" onclick="setMode('name')">name → fret</button>
  </div>

  <div class="card">
    <div class="centered-unit">
      <div class="string-strip" id="strip"></div>
      <span class="num-el" id="numEl"></span>
    </div>
  </div>

  <!-- dev controls — simulates pitch detection response -->
  <div class="btn-row">
    <button class="btn wrong" onclick="doWrong()">✗ Wrong note</button>
    <button class="btn right" onclick="doRight()">✓ Correct</button>
  </div>

  <div class="version-tag">flash card proto v1 · fret↔name · low E weight · shake on wrong · teal on correct</div>

</div>

<script>
// ── SEQUENCES ──
// Each item: { val: display string, str: string index 0=high e .. 5=low E }

const fretSeq = [
  // low E string
  { val: '0', str: 5 },
  { val: '2', str: 5 },
  { val: '3', str: 5 },
  { val: '5', str: 5 },
  // A string
  { val: '0', str: 4 },
  { val: '2', str: 4 },
  { val: '3', str: 4 },
  // D string
  { val: '0', str: 3 },
  { val: '2', str: 3 },
  // G string
  { val: '0', str: 2 },
  { val: '5', str: 2 },
  // B string
  { val: '0', str: 1 },
  { val: '3', str: 1 },
  // high e string
  { val: '0', str: 0 },
  { val: '3', str: 0 },
  { val: '5', str: 0 },
];

const nameSeq = [
  // low E string
  { val: 'E',  str: 5 },
  { val: 'F',  str: 5 },
  { val: 'F#', str: 5 },
  { val: 'G',  str: 5 },
  { val: 'A',  str: 5 },
  // A string
  { val: 'A',  str: 4 },
  { val: 'B',  str: 4 },
  { val: 'C',  str: 4 },
  // D string
  { val: 'D',  str: 3 },
  { val: 'E',  str: 3 },
  // G string
  { val: 'G',  str: 2 },
  { val: 'A',  str: 2 },
  // B string
  { val: 'B',  str: 1 },
  { val: 'C',  str: 1 },
  // high e string
  { val: 'E',  str: 0 },
  { val: 'G',  str: 0 },
  { val: 'A',  str: 0 },
];

// ── STRING RENDERING ──
// All strings same color — low E differs only in thickness (2.5px vs 1px)
// Matches tab component prototype exactly.
const STRING_HEIGHTS  = [1, 1, 1, 1, 1, 2.5]; // px, index 0=high e, 5=low E
const STRING_COLOR    = 'var(--color-border-secondary)';
const TEAL            = '#4ab8d4';
const STRING_SPACING  = 14; // px between strings — same as tab component

// ── STATE ──
let mode = 'fret';
let seq  = fretSeq;
let idx  = 0;
let busy = false;

const numEl = document.getElementById('numEl');
const strip = document.getElementById('strip');

// ── RENDER ──
function renderStrip(activeStr) {
  const count = 6;
  strip.style.height = ((count - 1) * STRING_SPACING) + 'px';
  strip.innerHTML = '';

  for (let i = 0; i < count; i++) {
    const isActive = (i === activeStr);
    const d = document.createElement('div');
    d.className = 'strip-str';
    d.style.top        = (i * STRING_SPACING) + 'px';
    d.style.height     = isActive ? '2.5px' : STRING_HEIGHTS[i] + 'px';
    d.style.background = isActive ? TEAL : STRING_COLOR;
    strip.appendChild(d);
  }
}

function renderCard() {
  const item = seq[idx];
  numEl.textContent = item.val;
  requestAnimationFrame(() => renderStrip(item.str));
}

function setMode(m) {
  mode = m;
  seq  = (m === 'fret') ? fretSeq : nameSeq;
  idx  = 0;
  document.getElementById('btnFret').classList.toggle('active', m === 'fret');
  document.getElementById('btnName').classList.toggle('active', m === 'name');
  renderCard();
}

// ── INTERACTIONS ──
// In production these are triggered by pitch detection, not buttons.

function doWrong() {
  if (busy) return;
  busy = true;
  numEl.classList.remove('shake', 'correct');
  void numEl.offsetWidth; // force reflow to restart animation
  numEl.classList.add('shake');
  numEl.style.color = 'var(--color-text-tertiary)';
  setTimeout(() => {
    numEl.classList.remove('shake');
    numEl.style.color = '';
    busy = false;
  }, 290);
}

function doRight() {
  if (busy) return;
  busy = true;
  numEl.classList.remove('shake', 'correct');
  void numEl.offsetWidth;
  numEl.classList.add('correct');
  setTimeout(() => {
    numEl.classList.remove('correct');
    idx = (idx + 1) % seq.length;
    renderCard();
    busy = false;
  }, 210);
}

// ── INIT ──
renderCard();
</script>
</body>
</html>
